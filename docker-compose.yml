services:
  postgres:
    image: postgres:17-alpine
    container_name: poker_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER:-poker}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-poker123}
      POSTGRES_DB: ${PG_DB:-dezhoupuke}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d dezhoupuke"]
      interval: 10s
      timeout: 3s
      retries: 5
